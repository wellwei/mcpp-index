# FFmpeg test project. compat.ffmpeg compiles all of FFmpeg 8.1.2 from source
# with mcpp itself (2281 TUs incl. 157 NASM .asm; no configure/make at build
# time — the config snapshot ships as generated_files in the descriptor).
# Linux + macOS: under those cfgs the dep is pulled (per-OS frozen config
# per-OS frozen config snapshot — linux NASM, macosx NEON, windows win64
# NASM) and the test asserts the full component surface on all three.
[package]
name    = "ffmpeg-tests"
version = "0.1.0"

[indices]
compat = { path = "../../.." }

[target.'cfg(linux)'.dependencies.compat]
ffmpeg = "8.1.2"

[target.'cfg(macos)'.dependencies.compat]
ffmpeg = "8.1.2"

[target.'cfg(windows)'.dependencies.compat]
ffmpeg = "8.1.2"
