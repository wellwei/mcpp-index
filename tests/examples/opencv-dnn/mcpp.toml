# compat.opencv `dnn` feature test: the deep-learning module as an ADDITIVE
# feature (+309 TUs: modules/dnn + vendored protobuf + mlas incl. .S
# kernels) joining the same lib. Linux-only like the base package; no-op
# main elsewhere.
[package]
name    = "opencv-dnn-tests"
version = "0.1.0"

[indices]
compat = { path = "../../.." }

[target.'cfg(linux)'.dependencies.compat]
opencv = { version = "5.0.0", features = ["dnn"] }

# macOS-arm64 dnn: compat.opencv now carries a per-OS NEON dnn feature
# (mcpp#253 per-OS features; mlas/lib/aarch64 + neon kernels). Builds the full
# dnn closure from source and runs the same blobFromImage assertion.
[target.'cfg(macos)'.dependencies.compat]
opencv = { version = "5.0.0", features = ["dnn"] }

# windows-x86_64 dnn: mlas is skipped (its x86 kernels are GAS/ELF .S, not COFF-
# assemblable under clang-cl), so DNN uses OpenCV's built-in fast_gemm (.cpp
# AVX/AVX2 kernels) — same blobFromImage assertion, no mlas.
[target.'cfg(windows)'.dependencies.compat]
opencv = { version = "5.0.0", features = ["dnn"] }

