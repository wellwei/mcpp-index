# OpenCV test project. compat.opencv builds core+imgproc+imgcodecs from source via
# its install() CMake hook (host-free: ecosystem xim:cmake/ninja + per-OS compiler)
# and links the static module libs. Windows is gated OFF: the install() hook fails
# deterministically there under mcpp 0.0.97 (fetch 'compat.opencv@4.13.0' exit 1,
# 2/2 reruns) — not worth debugging, the install() form is replaced wholesale by
# the source-build compat.opencv in the follow-up unification PR (#79).
# Resolves compat.opencv from this repo's own index.
[package]
name    = "opencv-tests"
version = "0.1.0"

[indices]
compat = { path = "../../.." }

[target.'cfg(linux)'.dependencies.compat]
opencv = "4.13.0"

[target.'cfg(macos)'.dependencies.compat]
opencv = "4.13.0"
