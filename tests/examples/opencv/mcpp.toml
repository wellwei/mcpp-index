# OpenCV 5 test project. compat.opencv (unified: the old install()-CMake 4.13
# form is gone) compiles OpenCV 5.0.0 from source with mcpp itself — real
# tarball paths + config snapshot + build.mcpp synthesis (fonts, OpenCL
# kernel embeddings, jpeg12/16 re-compile stubs) — and pulls compat.ffmpeg
# transitively for the videoio FFmpeg backend. Linux-only for now: the
# config snapshot is target-specific; off-Linux the test compiles to a
# no-op main() so `mcpp test --workspace` is a clean no-op there.
[package]
name    = "opencv-tests"
version = "0.1.0"

[indices]
compat = { path = "../../.." }

[target.'cfg(linux)'.dependencies.compat]
opencv = "5.0.0"
