# OpenCV test project. compat.opencv builds core+imgproc+imgcodecs from source via
# its install() CMake hook (host-free: ecosystem xim:cmake/ninja + per-OS compiler)
# and links the static module libs. Supported on all three platforms, each with the
# compiler whose ABI matches that platform's mcpp consumer (linux gcc/libstdc++,
# macOS clang/libc++, Windows clang-cl/msvc-stl), so the dependency is unconditional.
# Resolves compat.opencv from this repo's own index.
[package]
name    = "opencv-tests"
version = "0.1.0"

[indices]
compat = { path = "../../.." }

[dependencies.compat]
opencv = "4.13.0"
